name: Test Jupyter Notebooks

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nbconvert termcolor
        
    - name: Run notebook tests (CPU-only, skip GPU-dependent notebooks)
      run: |
        # Test Chapter 2 (00-20, skip 21-25 which require GPU)
        for i in {00..20}; do
          file="02_PyTorch_Algorithms/${i}_*.ipynb"
          if ls $file 1> /dev/null 2>&1; then
            python test_notebook_answers.py $file --mode answer || true
          fi
        done

        # Skip Chapter 3 entirely (all require NVIDIA GPU for CUDA/Triton)
